<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fireboy &amp; Watergirl</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #541799; overflow: hidden; }
    #game { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    var playGame = new Phaser.Class({
      Extends: Phaser.Scene,
      initialize: function () {
        Phaser.Scene.call(this, { key: "playGame" });
        this.score = 0;
        this.pass = 0;
        this.activeStars = [true, true, true, true, true, true];
        this.gameOver = false;
      },

      preload: function () {
        this.load.image("sky", "assets/sky.png");
        this.load.image("ground", "assets/platform.png");
        this.load.image("star", "assets/star.png");
        this.load.image("bomb", "assets/bomb.png");
        this.load.image("door", "assets/door.png");
        this.load.image("danger1", "assets/danger1.png");
        this.load.image("danger2", "assets/danger2.png");
        this.load.spritesheet("dude", "assets/dude.png", {
          frameWidth: 32, frameHeight: 48
        });
      },

      create: function () {
        var self = this;

        this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
        this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
        this.keyW = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W);
        this.cursors = this.input.keyboard.createCursorKeys();

        this.add.image(400, 300, "sky");

        // platforms
        this.platforms = this.physics.add.staticGroup();
        this.platforms.create(400, 568, "ground").setScale(2).refreshBody();
        this.platforms.create(400, 400, "ground").setScale(0.8, 0.5).refreshBody();
        this.platforms.create(50, 250, "ground").setScale(0.3, 1).refreshBody();
        this.platforms.create(750, 250, "ground").setScale(0.3, 1).refreshBody();
        this.platforms.create(400, 100, "ground").setScale(0.6, 0.5).refreshBody();

        // player 1 (cyan, arrow keys)
        this.player = this.physics.add.sprite(50, 450, "dude");
        this.player.setBounce(0.2);
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);
        this.player.setTint(0x00ffff);

        // player 2 (red, A/D/W)
        this.player2 = this.physics.add.sprite(740, 450, "dude");
        this.player2.setBounce(0.2);
        this.player2.setCollideWorldBounds(true);
        this.physics.add.collider(this.player2, this.platforms);
        this.player2.setTint(0xff0000);

        // door
        this.door = this.physics.add.staticGroup();
        this.physics.add.collider(this.player, this.door, this.colideDoor, null, this);
        this.physics.add.collider(this.player2, this.door, this.colideDoor, null, this);
        this.door.create(400, 60, "door").setScale(2).refreshBody();

        // danger blocks
        this.danger1 = this.physics.add.staticGroup();
        this.physics.add.collider(this.player, this.danger1, this.colideBlock, null, this);
        this.danger1.create(200, 530, "danger1").setScale(0.5, 0.75).refreshBody();
        this.danger1.create(750, 230, "danger1").setScale(0.3, 0.5).refreshBody();

        this.danger2 = this.physics.add.staticGroup();
        this.physics.add.collider(this.player2, this.danger2, this.colideBlock, null, this);
        this.danger2.create(580, 530, "danger2").setScale(0.5, 0.75).refreshBody();
        this.danger2.create(50, 230, "danger2").setScale(0.3, 0.5).refreshBody();

        // animations
        this.anims.create({
          key: "left",
          frames: this.anims.generateFrameNumbers("dude", { start: 0, end: 3 }),
          frameRate: 10, repeat: -1
        });
        this.anims.create({
          key: "turn",
          frames: [{ key: "dude", frame: 4 }],
          frameRate: 20
        });
        this.anims.create({
          key: "right",
          frames: this.anims.generateFrameNumbers("dude", { start: 5, end: 8 }),
          frameRate: 10, repeat: -1
        });

        // stars
        this.stars = this.physics.add.group();
        this.stars.create(200, 290, "star");
        this.stars.create(600, 290, "star");
        this.stars.create(70, 100, "star");
        this.stars.create(730, 100, "star");
        this.stars.create(300, 300, "star");
        this.stars.create(500, 300, "star");

        this.stars.children.iterate(function (child) {
          child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
        });

        this.physics.add.collider(this.stars, this.platforms);
        this.physics.add.overlap(this.player, this.stars, this.collectStar, null, this);
        this.physics.add.overlap(this.player2, this.stars, this.collectStar, null, this);

        // score
        this.scoreText = this.add.text(16, 16, "Score: 0", {
          fontSize: "32px", fill: "#fff"
        }).setDepth(10);
      },

      update: function () {
        // Player 1 — arrow keys
        if (this.cursors.left.isDown) {
          this.player.setVelocityX(-160);
          this.player.anims.play("left", true);
        } else if (this.cursors.right.isDown) {
          this.player.setVelocityX(160);
          this.player.anims.play("right", true);
        } else {
          this.player.setVelocityX(0);
          this.player.anims.play("turn");
        }
        if (this.cursors.up.isDown && this.player.body.touching.down) {
          this.player.setVelocityY(-330);
        }

        // Player 2 — A/D/W
        if (this.keyA.isDown) {
          this.player2.setVelocityX(-160);
          this.player2.anims.play("left", true);
        } else if (this.keyD.isDown) {
          this.player2.setVelocityX(160);
          this.player2.anims.play("right", true);
        } else {
          this.player2.setVelocityX(0);
          this.player2.anims.play("turn");
        }
        if (this.keyW.isDown && this.player2.body.touching.down) {
          this.player2.setVelocityY(-330);
        }

        // update score text
        var score = 0;
        for (var i = 0; i < this.activeStars.length; i++) {
          if (!this.activeStars[i]) score += 10;
        }
        this.score = score;
        this.scoreText.setText("Score: " + this.score);
      },

      collectStar: function (player, star) {
        for (var i = 0; i < this.stars.children.entries.length; i++) {
          if (this.stars.children.entries[i] === star) {
            this.activeStars[i] = false;
          }
        }
      },

      colideBlock: function () {
        this.physics.pause();
        this.player.setTint(0xff00ff);
        this.player2.setTint(0xff00ff);
        this.player.anims.play("turn");
        this.gameOver = true;
      },

      colideDoor: function () {
        if (this.score >= 60) {
          this.gameOver = true;
          this.player.disableBody(true, true);
          this.player2.disableBody(true, true);
          this.scoreText.setText("You Win!");
        }
      }
    });

    var config = {
      type: Phaser.AUTO,
      parent: "game",
      width: 800,
      height: 600,
      physics: {
        default: "arcade",
        arcade: { gravity: { y: 300 }, debug: false }
      },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [playGame]
    };

    var game = new Phaser.Game(config);
  </script>
</body>
</html>
